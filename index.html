<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valentine Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, 
                #ff5f6d, #ffc371, #ff69b4, #b93d95,
                #4158D0, #ff69b4, #ff8787, #ff5f6d);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card {
            position: relative;
            width: 90%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 
                0 0 20px rgba(255,105,180,0.3),
                inset 0 0 20px rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.2);
            animation: cardGlow 3s ease-in-out infinite;
        }

        @keyframes cardGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(255,105,180,0.3),
                                 inset 0 0 20px rgba(255,255,255,0.2); }
            50% { box-shadow: 0 0 30px rgba(255,105,180,0.5),
                             inset 0 0 30px rgba(255,255,255,0.3); }
        }

        .slideshow {
            position: relative;
            height: 400px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }

        .slide.active {
            opacity: 1;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
            transition: transform 0.5s ease;
        }

        .slide:hover img {
            transform: scale(1.05);
        }

        .prev, .next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.25);
            backdrop-filter: blur(5px);
            color: white;
            padding: 20px;
            cursor: pointer;
            border: none;
            border-radius: 50%;
            font-size: 22px;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.3);
            text-shadow: 0 0 10px rgba(255,105,180,0.5);
        }

        .prev:hover, .next:hover {
            background: rgba(255,255,255,0.4);
            box-shadow: 0 0 15px rgba(255,105,180,0.5);
        }

        .prev { left: 10px; }
        .next { right: 10px; }

        .message {
            text-align: center;
            color: white;
            font-size: 28px;
            margin: 25px 0;
            text-shadow: 
                0 0 10px rgba(255,105,180,0.5),
                2px 2px 4px rgba(0,0,0,0.3);
            font-weight: bold;
            letter-spacing: 1px;
        }

        .heart {
            position: absolute;
            pointer-events: none;
            animation: float 6s ease-in-out infinite;
            color: rgba(255,255,255,0.9);
            text-shadow: 0 0 10px #ff69b4;
            filter: drop-shadow(0 0 5px rgba(255,105,180,0.5));
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(20px, -20px) rotate(180deg); }
        }

        @media (max-width: 768px) {
            .slideshow {
                height: 300px;
            }
            .message {
                font-size: 20px;
            }
        }

        @media (max-width: 480px) {
            .slideshow {
                height: 250px;
            }
            .prev, .next {
                padding: 10px;
                font-size: 16px;
            }
        }

        /* เพิ่ม Glitter Effect */
        .glitter {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image: 
                radial-gradient(circle, white 1px, transparent 1px);
            background-size: 10px 10px;
            opacity: 0.1;
            animation: sparkle 4s ease-in-out infinite;
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0.1; }
            50% { opacity: 0.2; }
        }
    </style>
</head>
<body>
    <div class="glitter"></div>
    <div class="card">
        <div class="slideshow">
            <!-- เพิ่มรูปภาพตามต้องการ -->
            <div class="slide active">
                <img src="https://scontent.fbkk12-1.fna.fbcdn.net/v/t39.30808-6/452549603_2781591645321562_8782647432082895574_n.jpg?stp=cp6_dst-jpg_tt6&_nc_cat=106&ccb=1-7&_nc_sid=6ee11a&_nc_ohc=iLix9N8r3OEQ7kNvgFWI95A&_nc_oc=AdiuaURfwPMwYDBKvAIeQRRp-euBhkE5pmrs2tTGYEudRPHValLbu_C70s9u-3rc3TzjEGwS7wEpgfs4hI2sexcZ&_nc_zt=23&_nc_ht=scontent.fbkk12-1.fna&_nc_gid=ADoqi2VHHYUtyEnzrYaD1d6&oh=00_AYBzUPkmGc3NtHkfi3gGqKic8wyN6f1WZwvL395aNPMbQw&oe=6799535A" alt="Valentine 1">
            </div>
            <div class="slide">
                <img src="image2.jpg" alt="Valentine 2">
            </div>
            <div class="slide">
                <img src="image3.jpg" alt="Valentine 3">
            </div>
            <button class="prev">❮</button>
            <button class="next">❯</button>
        </div>
        <div class="message" id="message">Happy Valentine's Day ❤️</div>
    </div>

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const messages = [
            "Happy Valentine's Day ❤️",
            "Love you forever 💕",
            "You're my everything 💝"
        ];

        function showSlide(n) {
            slides.forEach(slide => slide.classList.remove('active'));
            currentSlide = (n + slides.length) % slides.length;
            slides[currentSlide].classList.add('active');
            document.getElementById('message').textContent = messages[currentSlide];
        }

        document.querySelector('.prev').addEventListener('click', () => {
            showSlide(currentSlide - 1);
            createHearts(10);
        });

        document.querySelector('.next').addEventListener('click', () => {
            showSlide(currentSlide + 1);
            createHearts(10);
        });

        function createHearts(count) {
            for(let i = 0; i < count; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'heart';
                    heart.innerHTML = ['❤️', '💖', '💝', '💕'][Math.floor(Math.random() * 4)];
                    heart.style.left = Math.random() * 100 + 'vw';
                    heart.style.top = Math.random() * 100 + 'vh';
                    heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
                    heart.style.filter = `hue-rotate(${Math.random() * 360}deg)`;
                    document.body.appendChild(heart);
                    
                    setTimeout(() => heart.remove(), 6000);
                }, i * 100);
            }
        }

        // Auto slide every 5 seconds
        setInterval(() => showSlide(currentSlide + 1), 5000);

        // Initial hearts
        createHearts(20);
    </script>
</body>
</html>
